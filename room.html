<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 ROBOT - FREEZE & DRAW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #1a202c;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 15px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        /* Camera Container */
        .camera-box {
            position: relative;
            width: 100%;
            height: 400px;
            background: black;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #667eea;
            margin-bottom: 15px;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
            background: transparent;
            display: block;
        }
        
        /* Buttons */
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            min-width: 70px;
        }
        
        .blue { background: #667eea; color: white; }
        .green { background: #48bb78; color: white; }
        .red { background: #f56565; color: white; }
        .orange { background: #ed8936; color: white; }
        .gray { background: #e2e8f0; color: black; }
        
        .active {
            background: #667eea !important;
            color: white !important;
            border: 2px solid white;
        }
        
        /* Info Panel */
        .info {
            background: #edf2f7;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: center;
        }
        
        .info div span {
            display: block;
            font-size: 12px;
            color: #718096;
        }
        
        .info div b {
            font-size: 18px;
            color: #667eea;
        }
        
        /* Connection */
        .conn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        #espIp {
            flex: 3;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
        }
        
        #connectBtn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
        }
        
        #connectionStatus {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .connected { background: #48bb78; color: white; }
        .disconnected { background: #f56565; color: white; }
        
        /* Control Pad */
        .pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        
        .pad-btn {
            aspect-ratio: 1;
            font-size: 24px;
            background: #e2e8f0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        
        /* Progress */
        .progress {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 FREEZE & DRAW ROBOT</h1>
        
        <!-- ESP Connection -->
        <div class="conn-row">
            <input type="text" id="espIp" value="192.168.4.1">
            <button id="connectBtn" onclick="connectESP()">CONNECT</button>
        </div>
        <div id="connectionStatus" class="disconnected">🔴 DISCONNECTED</div>
        
        <!-- CAMERA SECTION -->
        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <!-- CAMERA CONTROLS -->
        <div class="row">
            <button class="green" onclick="startLive()" id="liveBtn">📷 LIVE</button>
            <button class="orange" onclick="freezeImage()" id="freezeBtn">❄️ FREEZE</button>
        </div>
        
        <!-- DRAWING MODES - ONLY WORK WHEN FROZEN -->
        <div class="row">
            <button class="gray" onclick="setMode('robot')" id="robotBtn">🤖 MARK ROBOT</button>
            <button class="gray" onclick="setMode('draw')" id="drawBtn">✏️ DRAW PATH</button>
            <button class="red" onclick="clearAll()">🗑️ CLEAR</button>
        </div>
        
        <!-- INFO -->
        <div class="info">
            <div>
                <span>ROBOT</span>
                <b id="robotStatus">NOT SET</b>
            </div>
            <div>
                <span>PATH POINTS</span>
                <b id="pointCount">0</b>
            </div>
        </div>
        
        <!-- PATH ACTIONS -->
        <div class="row">
            <button class="blue" style="flex:2" onclick="calculatePath()">📐 CALCULATE</button>
            <button class="green" style="flex:1" onclick="sendToESP()">📤 SEND</button>
        </div>
        
        <!-- PROGRESS -->
        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <!-- MOVEMENT -->
        <div class="row">
            <button class="green" style="flex:2" onclick="startMovement()">▶️ START</button>
            <button class="red" style="flex:1" onclick="emergencyStop()">⏹️ STOP</button>
        </div>
        
        <!-- MANUAL CONTROL -->
        <div style="background:#f8f9fa; border-radius:15px; padding:12px; margin-top:15px;">
            <h3 style="margin-bottom:10px;">🎮 MANUAL</h3>
            <div class="pad">
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('forward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('forward')" onmouseup="sendCommand('stop')">⬆️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('left')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('left')" onmouseup="sendCommand('stop')">⬅️</button>
                <button class="pad-btn" onclick="sendCommand('stop')">⏹️</button>
                <button class="pad-btn" ontouchstart="sendCommand('right')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('right')" onmouseup="sendCommand('stop')">➡️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('backward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('backward')" onmouseup="sendCommand('stop')">⬇️</button>
                <div></div>
            </div>
        </div>
    </div>

    <script>
        // ========== VARIABLES ==========
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        
        let isLive = true;
        let currentMode = 'draw';
        let robotPosition = null;
        let pathPoints = [];
        let isDrawing = false;
        
        let espIP = '192.168.4.1';
        let espConnected = false;
        let movementCommands = [];
        
        // ========== CAMERA ==========
        async function startLive() {
            try {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                isLive = true;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                };
                
                document.getElementById('liveBtn').style.background = '#48bb78';
                document.getElementById('freezeBtn').style.background = '#ed8936';
            } catch(e) {
                alert('Camera error: ' + e.message);
            }
        }
        
        function freezeImage() {
            if (!video.srcObject) {
                alert('Start live first!');
                return;
            }
            // Draw video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            isLive = false;
            
            document.getElementById('freezeBtn').style.background = '#48bb78';
            document.getElementById('liveBtn').style.background = '#667eea';
        }
        
        // ========== DRAWING (ONLY WHEN FROZEN) ==========
        function setMode(mode) {
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            
            currentMode = mode;
            document.getElementById('robotBtn').classList.remove('active');
            document.getElementById('drawBtn').classList.remove('active');
            
            if (mode === 'robot') {
                document.getElementById('robotBtn').classList.add('active');
            } else {
                document.getElementById('drawBtn').classList.add('active');
            }
        }
        
        // Canvas events
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            e.preventDefault();
            if (isDrawing && !isLive) handleDraw(e);
        });
        
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);
        
        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing && !isLive) handleDraw(e);
        });
        
        canvas.addEventListener('touchend', () => isDrawing = false);
        
        function handleDraw(e) {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            
            if (currentMode === 'robot') {
                // Mark robot
                robotPosition = {x, y};
                drawRobot(x, y);
                document.getElementById('robotStatus').innerText = 'SET';
            } else {
                // Draw path
                if (!robotPosition) {
                    alert('Mark robot first!');
                    isDrawing = false;
                    return;
                }
                
                if (pathPoints.length === 0) {
                    pathPoints.push(robotPosition);
                }
                
                pathPoints.push({x, y});
                drawLine(pathPoints[pathPoints.length-2], {x, y}, '#f56565');
                drawPoint(x, y, '#f56565');
                document.getElementById('pointCount').innerText = pathPoints.length - 1;
            }
        }
        
        function drawRobot(x, y) {
            ctx.fillStyle = '#48bb78';
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('R', x, y);
        }
        
        function drawPoint(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawLine(p1, p2, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
        
        function clearAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            robotPosition = null;
            pathPoints = [];
            document.getElementById('robotStatus').innerText = 'NOT SET';
            document.getElementById('pointCount').innerText = '0';
        }
        
        // ========== PATH CALCULATION ==========
        function calculatePath() {
            if (!robotPosition || pathPoints.length < 2) {
                alert('Mark robot and draw path!');
                return;
            }
            
            movementCommands = [];
            let totalDist = 0;
            
            for (let i = 1; i < pathPoints.length; i++) {
                const p1 = pathPoints[i-1];
                const p2 = pathPoints[i];
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                const dist = Math.sqrt(dx*dx + dy*dy) * 0.5; // cm
                
                totalDist += dist;
                
                if (Math.abs(angle) > 5) {
                    movementCommands.push({
                        type: 'turn',
                        dir: angle > 0 ? 'right' : 'left',
                        time: Math.abs(angle) * 10
                    });
                }
                
                movementCommands.push({
                    type: 'forward',
                    time: dist * 100
                });
            }
            
            alert(`Path calculated: ${totalDist.toFixed(1)} cm`);
        }
        
        function sendToESP() {
            if (movementCommands.length === 0) {
                alert('Calculate first!');
                return;
            }
            alert('Path sent to ESP!');
        }
        
        function startMovement() {
            if (movementCommands.length === 0) {
                alert('Calculate first!');
                return;
            }
            executeCommand(0);
        }
        
        function executeCommand(index) {
            if (index >= movementCommands.length) {
                sendCommand('stop');
                document.getElementById('progressFill').style.width = '0%';
                return;
            }
            
            const cmd = movementCommands[index];
            sendCommand(cmd.type === 'turn' ? cmd.dir : 'forward');
            
            const progress = ((index + 1) / movementCommands.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            setTimeout(() => {
                sendCommand('stop');
                setTimeout(() => executeCommand(index + 1), 200);
            }, cmd.time);
        }
        
        // ========== ESP COMMANDS ==========
        function connectESP() {
            espIP = document.getElementById('espIp').value;
            fetch(`http://${espIP}/ping`)
                .then(r => r.text())
                .then(d => {
                    if (d === 'pong') {
                        espConnected = true;
                        document.getElementById('connectionStatus').className = 'connected';
                        document.getElementById('connectionStatus').innerText = '🟢 CONNECTED';
                    }
                })
                .catch(() => {
                    document.getElementById('connectionStatus').className = 'disconnected';
                    document.getElementById('connectionStatus').innerText = '🔴 DISCONNECTED';
                });
        }
        
        function sendCommand(cmd) {
            if (!espConnected) {
                console.log('Command:', cmd);
                return;
            }
            fetch(`http://${espIP}/move?dir=${cmd}`).catch(() => {});
        }
        
        function emergencyStop() {
            sendCommand('stop');
            document.getElementById('progressFill').style.width = '0%';
        }
        
        // Start live on load
        window.onload = () => startLive();
    </script>
</body>
</html>
