<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 Robot Path Planner - FIXED</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: white;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .section h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        /* Camera Container */
        .camera-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: #2d3748;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 2px solid #667eea;
        }
        
        #video, #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #video {
            z-index: 1;
            transform: scaleX(-1);
            background: #1a202c;
        }
        
        #canvas {
            z-index: 2;
            cursor: crosshair;
            transform: scaleX(-1);
            background: transparent;
        }
        
        .camera-controls {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 70px;
            font-size: 14px;
            background: #e2e8f0;
            color: #2d3748;
        }
        
        .btn.primary {
            background: #667eea;
            color: white;
        }
        
        .btn.success {
            background: #48bb78;
            color: white;
        }
        
        .btn.danger {
            background: #f56565;
            color: white;
        }
        
        .btn.warning {
            background: #ed8936;
            color: white;
        }
        
        .btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.02);
        }
        
        .info-bar {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background: #edf2f7;
            border-radius: 10px;
        }
        
        .info-item {
            flex: 1;
            text-align: center;
        }
        
        .info-label {
            font-size: 11px;
            color: #718096;
        }
        
        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
        }
        
        .control-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        
        .pad-btn {
            aspect-ratio: 1;
            font-size: 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .pad-btn:active {
            background: #667eea;
            color: white;
        }
        
        .connection-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        #espIp {
            flex: 3;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        #connectBtn {
            flex: 1;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        
        #connectionStatus {
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        
        .connected {
            background: #48bb78;
            color: white;
        }
        
        .disconnected {
            background: #f56565;
            color: white;
        }
        
        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        .sensor-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
        
        .status-text {
            font-size: 12px;
            color: #718096;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Robot Path Planner</h1>
        
        <!-- ESP Connection -->
        <div class="section">
            <h2>📶 1. Connection</h2>
            <div class="connection-box">
                <input type="text" id="espIp" placeholder="ESP IP" value="192.168.4.1">
                <button id="connectBtn" onclick="connectESP()">Connect</button>
            </div>
            <div id="connectionStatus" class="disconnected">🔴 Disconnected</div>
        </div>
        
        <!-- Camera Section -->
        <div class="section">
            <h2>📸 2. Camera & Drawing</h2>
            
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="camera-controls">
                <button class="btn primary" onclick="startCamera()" id="startCameraBtn">📷 Start Camera</button>
                <button class="btn warning" onclick="stopCamera()" id="stopCameraBtn">⏹️ Stop</button>
                <button class="btn success" onclick="freezeFrame()">📸 Freeze</button>
            </div>
            
            <div class="camera-controls">
                <button class="btn" onclick="setMode('robot')" id="modeRobotBtn">🤖 Mark Robot</button>
                <button class="btn active" onclick="setMode('draw')" id="modeDrawBtn">✏️ Draw Path</button>
                <button class="btn danger" onclick="clearCanvas()">🗑️ Clear</button>
            </div>
            
            <div class="info-bar">
                <div class="info-item">
                    <div class="info-label">Robot</div>
                    <div class="info-value" id="robotStatus">⚪ Not set</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Points</div>
                    <div class="info-value" id="pointCount">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Mode</div>
                    <div class="info-value" id="currentMode">Draw</div>
                </div>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <button class="btn primary" style="flex: 2;" onclick="calculatePath()">🧮 Calculate</button>
                <button class="btn success" style="flex: 1;" onclick="sendPath()">📤 Send</button>
            </div>
        </div>
        
        <!-- Movement -->
        <div class="section">
            <h2>🚀 3. Movement</h2>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <button class="btn success" style="flex: 2;" onclick="startMovement()">▶️ Start</button>
                <button class="btn danger" style="flex: 1;" onclick="emergencyStop()">🛑 STOP</button>
            </div>
            
            <div class="control-pad">
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('forward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('forward')" onmouseup="sendCommand('stop')">⬆️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('left')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('left')" onmouseup="sendCommand('stop')">⬅️</button>
                <button class="pad-btn" onclick="sendCommand('stop')">⏹️</button>
                <button class="pad-btn" ontouchstart="sendCommand('right')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('right')" onmouseup="sendCommand('stop')">➡️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('backward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('backward')" onmouseup="sendCommand('stop')">⬇️</button>
                <div></div>
            </div>
        </div>
        
        <!-- Sensors -->
        <div class="section">
            <h2>📊 4. Sensors</h2>
            <div class="sensor-grid">
                <div class="sensor-card">
                    <div>📡 Distance</div>
                    <div style="font-size: 24px; color: #667eea;" id="ultrasonicValue">-- cm</div>
                </div>
                <div class="sensor-card">
                    <div>⚫ IR Sensor</div>
                    <div style="font-size: 24px; color: #667eea;" id="irValue">--</div>
                </div>
            </div>
            <button class="btn primary" style="width: 100%;" onclick="startSensors()">🔄 Read Sensors</button>
        </div>
        
        <!-- Follow Mode -->
        <div class="section">
            <h2>📱 5. Follow Mode</h2>
            <button class="btn warning" style="width: 100%;" onclick="toggleFollow()" id="followBtn">▶️ Follow Phone</button>
            <div class="status-text" id="rssiValue">Signal: -- dBm</div>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let espIP = '192.168.4.1';
        let espConnected = false;
        
        // Camera
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let cameraStream = null;
        let isCameraOn = false;
        
        // Drawing
        let currentMode = 'draw'; // 'robot' or 'draw'
        let robotPosition = null;
        let pathPoints = [];
        let isDrawing = false;
        
        // Path
        let movementCommands = [];
        
        // Sensors
        let sensorInterval = null;
        let followInterval = null;
        let isFollowing = false;
        
        // ========== CAMERA FUNCTIONS ==========
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = cameraStream;
                
                video.onloadedmetadata = function() {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    console.log('Camera ready:', canvas.width, 'x', canvas.height);
                };
                
                isCameraOn = true;
                document.getElementById('startCameraBtn').style.background = '#48bb78';
                document.getElementById('startCameraBtn').textContent = '✅ Camera On';
                
            } catch (error) {
                alert('Camera error: ' + error.message);
            }
        }
        
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isCameraOn = false;
                document.getElementById('startCameraBtn').style.background = '#667eea';
                document.getElementById('startCameraBtn').textContent = '📷 Start Camera';
            }
        }
        
        function freezeFrame() {
            if (!isCameraOn) {
                alert('Start camera first!');
                return;
            }
            // Draw current video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            // Redraw robot and path if they exist
            redrawAll();
        }
        
        // ========== DRAWING FUNCTIONS ==========
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeRobotBtn').classList.remove('active');
            document.getElementById('modeDrawBtn').classList.remove('active');
            
            if (mode === 'robot') {
                document.getElementById('modeRobotBtn').classList.add('active');
                document.getElementById('currentMode').textContent = 'Robot';
            } else {
                document.getElementById('modeDrawBtn').classList.add('active');
                document.getElementById('currentMode').textContent = 'Draw';
            }
        }
        
        // Canvas event listeners
        canvas.addEventListener('mousedown', function(e) {
            e.preventDefault();
            if (!isCameraOn) {
                alert('Start camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('mousemove', function(e) {
            e.preventDefault();
            if (isDrawing) {
                handleDraw(e);
            }
        });
        
        canvas.addEventListener('mouseup', function() {
            isDrawing = false;
        });
        
        canvas.addEventListener('mouseleave', function() {
            isDrawing = false;
        });
        
        // Touch events
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (!isCameraOn) {
                alert('Start camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (isDrawing) {
                handleDraw(e);
            }
        });
        
        canvas.addEventListener('touchend', function() {
            isDrawing = false;
        });
        
        function handleDraw(e) {
            e.preventDefault();
            
            // Get coordinates
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            if (currentMode === 'robot') {
                // Set robot position
                robotPosition = {x, y};
                clearCanvas();
                drawRobot(x, y);
                document.getElementById('robotStatus').textContent = '✅ Set';
                updatePointCount();
                setMode('draw'); // Switch to draw mode automatically
            } else {
                // Draw path
                if (!robotPosition) {
                    alert('Mark robot position first!');
                    isDrawing = false;
                    return;
                }
                
                // Start path from robot if empty
                if (pathPoints.length === 0) {
                    pathPoints.push(robotPosition);
                    drawPoint(robotPosition.x, robotPosition.y, '#48bb78');
                }
                
                // Add point
                pathPoints.push({x, y});
                
                // Draw line from last point
                const last = pathPoints[pathPoints.length - 2];
                drawLine(last.x, last.y, x, y, '#f56565');
                drawPoint(x, y, '#f56565');
                
                updatePointCount();
            }
        }
        
        function drawRobot(x, y) {
            ctx.fillStyle = '#48bb78';
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('R', x, y);
        }
        
        function drawPoint(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawLine(x1, y1, x2, y2, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            robotPosition = null;
            pathPoints = [];
            document.getElementById('robotStatus').textContent = '⚪ Not set';
            updatePointCount();
        }
        
        function redrawAll() {
            if (robotPosition) {
                drawRobot(robotPosition.x, robotPosition.y);
            }
            
            for (let i = 1; i < pathPoints.length; i++) {
                drawLine(
                    pathPoints[i-1].x, pathPoints[i-1].y,
                    pathPoints[i].x, pathPoints[i].y,
                    '#f56565'
                );
                drawPoint(pathPoints[i].x, pathPoints[i].y, '#f56565');
            }
        }
        
        function updatePointCount() {
            document.getElementById('pointCount').textContent = pathPoints.length;
        }
        
        // ========== PATH CALCULATION ==========
        function calculatePath() {
            if (!robotPosition || pathPoints.length < 2) {
                alert('Mark robot and draw path first!');
                return;
            }
            
            // Calculate total distance
            let totalPixels = 0;
            for (let i = 1; i < pathPoints.length; i++) {
                const dx = pathPoints[i].x - pathPoints[i-1].x;
                const dy = pathPoints[i].y - pathPoints[i-1].y;
                totalPixels += Math.sqrt(dx*dx + dy*dy);
            }
            
            const totalCm = totalPixels * 0.5; // 0.5 cm per pixel
            alert(`Path calculated: ${totalCm.toFixed(1)} cm`);
            
            // Create movement commands
            movementCommands = [];
            for (let i = 1; i < pathPoints.length; i++) {
                const dx = pathPoints[i].x - pathPoints[i-1].x;
                const dy = pathPoints[i].y - pathPoints[i-1].y;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                const distance = Math.sqrt(dx*dx + dy*dy) * 0.5;
                
                if (Math.abs(angle) > 5) {
                    movementCommands.push({
                        type: 'turn',
                        dir: angle > 0 ? 'right' : 'left',
                        duration: Math.abs(angle) * 10
                    });
                }
                
                movementCommands.push({
                    type: 'forward',
                    duration: distance * 100 // 100ms per cm
                });
            }
        }
        
        function sendPath() {
            if (movementCommands.length === 0) {
                alert('Calculate path first!');
                return;
            }
            alert('Path ready to execute!');
        }
        
        function startMovement() {
            if (movementCommands.length === 0) {
                alert('Calculate path first!');
                return;
            }
            executeCommands(0);
        }
        
        function executeCommands(index) {
            if (index >= movementCommands.length) {
                sendCommand('stop');
                document.getElementById('progressFill').style.width = '0%';
                return;
            }
            
            const cmd = movementCommands[index];
            if (cmd.type === 'turn') {
                sendCommand(cmd.dir);
            } else {
                sendCommand('forward');
            }
            
            const progress = ((index + 1) / movementCommands.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            setTimeout(() => {
                sendCommand('stop');
                setTimeout(() => {
                    executeCommands(index + 1);
                }, 200);
            }, cmd.duration);
        }
        
        // ========== ESP COMMANDS ==========
        function connectESP() {
            espIP = document.getElementById('espIp').value;
            const status = document.getElementById('connectionStatus');
            
            fetch(`http://${espIP}/ping`)
                .then(response => response.text())
                .then(data => {
                    if (data === 'pong') {
                        espConnected = true;
                        status.className = 'connected';
                        status.innerHTML = '🟢 Connected';
                    }
                })
                .catch(() => {
                    espConnected = false;
                    status.className = 'disconnected';
                    status.innerHTML = '🔴 Disconnected';
                });
        }
        
        function sendCommand(cmd) {
            if (!espConnected) {
                console.log('ESP not connected, command:', cmd);
                return;
            }
            fetch(`http://${espIP}/move?dir=${cmd}`).catch(() => {});
        }
        
        function emergencyStop() {
            sendCommand('stop');
            if (sensorInterval) clearInterval(sensorInterval);
            if (followInterval) clearInterval(followInterval);
            document.getElementById('progressFill').style.width = '0%';
        }
        
        // ========== SENSORS ==========
        function startSensors() {
            if (!espConnected) {
                alert('Connect ESP first!');
                return;
            }
            
            if (sensorInterval) clearInterval(sensorInterval);
            
            sensorInterval = setInterval(() => {
                fetch(`http://${espIP}/sensors`)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('ultrasonicValue').textContent = data.ultrasonic + ' cm';
                        document.getElementById('irValue').textContent = data.ir ? '⚫ Black' : '⚪ White';
                        
                        if (data.ultrasonic < 20) {
                            emergencyStop();
                        }
                    });
            }, 500);
        }
        
        // ========== FOLLOW MODE ==========
        function toggleFollow() {
            if (!espConnected) {
                alert('Connect ESP first!');
                return;
            }
            
            isFollowing = !isFollowing;
            const btn = document.getElementById('followBtn');
            
            if (isFollowing) {
                btn.textContent = '⏹️ Stop Following';
                btn.style.background = '#f56565';
                
                followInterval = setInterval(() => {
                    fetch(`http://${espIP}/rssi`)
                        .then(response => response.text())
                        .then(rssi => {
                            document.getElementById('rssiValue').textContent = 'Signal: ' + rssi + ' dBm';
                            if (parseInt(rssi) < -65) {
                                sendCommand('forward');
                            } else {
                                sendCommand('stop');
                            }
                        });
                }, 1000);
            } else {
                btn.textContent = '▶️ Follow Phone';
                btn.style.background = '#ed8936';
                if (followInterval) clearInterval(followInterval);
                sendCommand('stop');
            }
        }
        
        // Auto-start camera when page loads
        window.onload = function() {
            startCamera();
        };
    </script>
</body>
</html>
