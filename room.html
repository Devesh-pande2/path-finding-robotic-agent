<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 ROBOT - FREEZE & DRAW + FOLLOW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #1a202c;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 15px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        h3 {
            margin-bottom: 10px;
            color: #4a5568;
            font-size: 16px;
        }
        
        /* Camera Container */
        .camera-box {
            position: relative;
            width: 100%;
            height: 350px;
            background: black;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #667eea;
            margin-bottom: 15px;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
            background: transparent;
            display: block;
        }
        
        /* Buttons */
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            min-width: 70px;
            transition: 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .blue { background: #667eea; color: white; }
        .green { background: #48bb78; color: white; }
        .red { background: #f56565; color: white; }
        .orange { background: #ed8936; color: white; }
        .purple { background: #9f7aea; color: white; }
        .gray { background: #e2e8f0; color: black; }
        
        .active {
            background: #667eea !important;
            color: white !important;
            border: 2px solid white;
        }
        
        /* Info Panel */
        .info {
            background: #edf2f7;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            text-align: center;
        }
        
        .info div span {
            display: block;
            font-size: 11px;
            color: #718096;
        }
        
        .info div b {
            font-size: 16px;
            color: #667eea;
        }
        
        /* Connection */
        .conn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        #espIp {
            flex: 3;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        #connectBtn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
        
        #connectionStatus {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .connected { background: #48bb78; color: white; }
        .disconnected { background: #f56565; color: white; }
        
        /* Control Pad */
        .pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        
        .pad-btn {
            aspect-ratio: 1;
            font-size: 24px;
            background: #e2e8f0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .pad-btn:active {
            background: #667eea;
            color: white;
        }
        
        /* Progress */
        .progress {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s;
        }
        
        /* Sensor Cards */
        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        .sensor-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .sensor-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        /* Follow Mode */
        .follow-box {
            background: #f7fafc;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #9f7aea;
        }
        
        .rssi-bar {
            width: 100%;
            height: 30px;
            background: #e2e8f0;
            border-radius: 15px;
            margin: 10px 0;
            overflow: hidden;
            position: relative;
        }
        
        .rssi-fill {
            height: 100%;
            background: linear-gradient(90deg, #f56565, #ed8936, #48bb78);
            width: 0%;
            transition: width 0.3s;
        }
        
        .rssi-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 ROBOT CONTROLLER + FOLLOW</h1>
        
        <!-- ESP Connection -->
        <div class="conn-row">
            <input type="text" id="espIp" value="192.168.4.1" placeholder="ESP IP">
            <button id="connectBtn" onclick="connectESP()">CONNECT</button>
        </div>
        <div id="connectionStatus" class="disconnected">🔴 DISCONNECTED</div>
        
        <!-- CAMERA SECTION -->
        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <!-- CAMERA CONTROLS -->
        <div class="row">
            <button class="green" onclick="startLive()" id="liveBtn">📷 LIVE</button>
            <button class="orange" onclick="freezeImage()" id="freezeBtn">❄️ FREEZE</button>
        </div>
        
        <!-- DRAWING MODES -->
        <div class="row">
            <button class="gray" onclick="setMode('robot')" id="robotBtn">🤖 MARK ROBOT</button>
            <button class="gray" onclick="setMode('draw')" id="drawBtn">✏️ DRAW PATH</button>
            <button class="red" onclick="clearAll()">🗑️ CLEAR</button>
        </div>
        
        <!-- INFO -->
        <div class="info">
            <div>
                <span>ROBOT</span>
                <b id="robotStatus">NOT SET</b>
            </div>
            <div>
                <span>POINTS</span>
                <b id="pointCount">0</b>
            </div>
            <div>
                <span>MODE</span>
                <b id="modeDisplay">DRAW</b>
            </div>
        </div>
        
        <!-- PATH ACTIONS -->
        <div class="row">
            <button class="blue" style="flex:2" onclick="calculatePath()">📐 CALCULATE</button>
            <button class="green" style="flex:1" onclick="sendToESP()">📤 SEND</button>
        </div>
        
        <!-- PROGRESS -->
        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <!-- MOVEMENT -->
        <div class="row">
            <button class="green" style="flex:2" onclick="startMovement()">▶️ START</button>
            <button class="red" style="flex:1" onclick="emergencyStop()">⏹️ STOP</button>
        </div>
        
        <!-- SENSORS -->
        <div style="background:#f8f9fa; border-radius:15px; padding:12px; margin:15px 0;">
            <h3>📡 SENSORS</h3>
            <div class="sensor-grid">
                <div class="sensor-card">
                    <div>ULTRASONIC</div>
                    <div class="sensor-value" id="ultrasonic">-- cm</div>
                    <div id="obstacleWarning" style="color:#f56565; font-size:12px;"></div>
                </div>
                <div class="sensor-card">
                    <div>IR SENSOR</div>
                    <div class="sensor-value" id="irSensor">⚪ WHITE</div>
                    <div id="goalWarning" style="color:#48bb78; font-size:12px;"></div>
                </div>
            </div>
            <button class="blue" style="width:100%;" onclick="startSensors()">🔄 READ SENSORS</button>
        </div>
        
        <!-- FOLLOW MODE - NEW FEATURE -->
        <div class="follow-box">
            <h3 style="display:flex; align-items:center; gap:5px;">📱 WI-FI FOLLOW MODE</h3>
            <p style="font-size:12px; color:#718096; margin-bottom:10px;">Robot will follow your phone based on signal strength</p>
            
            <div class="row">
                <button class="purple" style="flex:2;" onclick="toggleFollow()" id="followBtn">▶️ START FOLLOWING</button>
                <button class="red" style="flex:1;" onclick="stopFollow()">⏹️ STOP</button>
            </div>
            
            <div style="position:relative; margin:15px 0;">
                <div class="rssi-bar">
                    <div class="rssi-fill" id="rssiFill"></div>
                    <div class="rssi-text" id="rssiValue">-- dBm</div>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>📱 PHONE FAR</span>
                <span>⚖️ BALANCE</span>
                <span>📱 PHONE NEAR</span>
            </div>
            
            <div style="margin-top:10px; padding:8px; background:#edf2f7; border-radius:8px; text-align:center; font-size:13px;" id="followStatus">
                ⏸️ Follow mode: OFF
            </div>
        </div>
        
        <!-- MANUAL CONTROL -->
        <div style="background:#f8f9fa; border-radius:15px; padding:12px; margin-top:15px;">
            <h3>🎮 MANUAL CONTROL</h3>
            <div class="pad">
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('forward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('forward')" onmouseup="sendCommand('stop')">⬆️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('left')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('left')" onmouseup="sendCommand('stop')">⬅️</button>
                <button class="pad-btn" onclick="sendCommand('stop')">⏹️</button>
                <button class="pad-btn" ontouchstart="sendCommand('right')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('right')" onmouseup="sendCommand('stop')">➡️</button>
                <div></div>
                <button class="pad-btn" ontouchstart="sendCommand('backward')" ontouchend="sendCommand('stop')" onmousedown="sendCommand('backward')" onmouseup="sendCommand('stop')">⬇️</button>
                <div></div>
            </div>
        </div>
    </div>

    <script>
        // ========== VARIABLES ==========
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        
        let isLive = true;
        let currentMode = 'draw';
        let robotPosition = null;
        let pathPoints = [];
        let isDrawing = false;
        
        let espIP = '192.168.4.1';
        let espConnected = false;
        let movementCommands = [];
        
        // Follow mode variables
        let isFollowing = false;
        let followInterval = null;
        let sensorInterval = null;
        
        // ========== CAMERA ==========
        async function startLive() {
            try {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                isLive = true;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                };
                
                document.getElementById('liveBtn').style.background = '#48bb78';
                document.getElementById('freezeBtn').style.background = '#ed8936';
            } catch(e) {
                alert('Camera error: ' + e.message);
            }
        }
        
        function freezeImage() {
            if (!video.srcObject) {
                alert('Start live first!');
                return;
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            isLive = false;
            
            document.getElementById('freezeBtn').style.background = '#48bb78';
            document.getElementById('liveBtn').style.background = '#667eea';
        }
        
        // ========== DRAWING ==========
        function setMode(mode) {
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            
            currentMode = mode;
            document.getElementById('robotBtn').classList.remove('active');
            document.getElementById('drawBtn').classList.remove('active');
            
            if (mode === 'robot') {
                document.getElementById('robotBtn').classList.add('active');
                document.getElementById('modeDisplay').innerText = 'ROBOT';
            } else {
                document.getElementById('drawBtn').classList.add('active');
                document.getElementById('modeDisplay').innerText = 'DRAW';
            }
        }
        
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            e.preventDefault();
            if (isDrawing && !isLive) handleDraw(e);
        });
        
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isLive) {
                alert('FREEZE the camera first!');
                return;
            }
            isDrawing = true;
            handleDraw(e);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing && !isLive) handleDraw(e);
        });
        
        canvas.addEventListener('touchend', () => isDrawing = false);
        
        function handleDraw(e) {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            
            if (currentMode === 'robot') {
                robotPosition = {x, y};
                drawRobot(x, y);
                document.getElementById('robotStatus').innerText = 'SET';
            } else {
                if (!robotPosition) {
                    alert('Mark robot first!');
                    isDrawing = false;
                    return;
                }
                
                if (pathPoints.length === 0) {
                    pathPoints.push(robotPosition);
                }
                
                pathPoints.push({x, y});
                drawLine(pathPoints[pathPoints.length-2], {x, y}, '#f56565');
                drawPoint(x, y, '#f56565');
                document.getElementById('pointCount').innerText = pathPoints.length - 1;
            }
        }
        
        function drawRobot(x, y) {
            ctx.fillStyle = '#48bb78';
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('R', x, y);
        }
        
        function drawPoint(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawLine(p1, p2, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
        
        function clearAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            robotPosition = null;
            pathPoints = [];
            document.getElementById('robotStatus').innerText = 'NOT SET';
            document.getElementById('pointCount').innerText = '0';
        }
        
        // ========== PATH CALCULATION ==========
        function calculatePath() {
            if (!robotPosition || pathPoints.length < 2) {
                alert('Mark robot and draw path!');
                return;
            }
            
            movementCommands = [];
            let totalDist = 0;
            
            for (let i = 1; i < pathPoints.length; i++) {
                const p1 = pathPoints[i-1];
                const p2 = pathPoints[i];
                
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                const dist = Math.sqrt(dx*dx + dy*dy) * 0.5;
                
                totalDist += dist;
                
                if (Math.abs(angle) > 5) {
                    movementCommands.push({
                        type: 'turn',
                        dir: angle > 0 ? 'right' : 'left',
                        time: Math.abs(angle) * 10
                    });
                }
                
                movementCommands.push({
                    type: 'forward',
                    time: dist * 100
                });
            }
            
            alert(`Path calculated: ${totalDist.toFixed(1)} cm`);
        }
        
        function sendToESP() {
            if (movementCommands.length === 0) {
                alert('Calculate first!');
                return;
            }
            alert('Path sent to ESP!');
        }
        
        function startMovement() {
            if (movementCommands.length === 0) {
                alert('Calculate first!');
                return;
            }
            if (isFollowing) stopFollow();
            executeCommand(0);
        }
        
        function executeCommand(index) {
            if (index >= movementCommands.length) {
                sendCommand('stop');
                document.getElementById('progressFill').style.width = '0%';
                return;
            }
            
            const cmd = movementCommands[index];
            sendCommand(cmd.type === 'turn' ? cmd.dir : 'forward');
            
            const progress = ((index + 1) / movementCommands.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            setTimeout(() => {
                sendCommand('stop');
                setTimeout(() => executeCommand(index + 1), 200);
            }, cmd.time);
        }
        
        // ========== ESP COMMANDS ==========
        function connectESP() {
            espIP = document.getElementById('espIp').value;
            fetch(`http://${espIP}/ping`)
                .then(r => r.text())
                .then(d => {
                    if (d === 'pong') {
                        espConnected = true;
                        document.getElementById('connectionStatus').className = 'connected';
                        document.getElementById('connectionStatus').innerText = '🟢 CONNECTED';
                    }
                })
                .catch(() => {
                    espConnected = false;
                    document.getElementById('connectionStatus').className = 'disconnected';
                    document.getElementById('connectionStatus').innerText = '🔴 DISCONNECTED';
                });
        }
        
        function sendCommand(cmd) {
            if (!espConnected) {
                console.log('Command:', cmd);
                return;
            }
            fetch(`http://${espIP}/move?dir=${cmd}`).catch(() => {});
        }
        
        function emergencyStop() {
            sendCommand('stop');
            if (isFollowing) stopFollow();
            if (sensorInterval) clearInterval(sensorInterval);
            document.getElementById('progressFill').style.width = '0%';
        }
        
        // ========== SENSORS ==========
        function startSensors() {
            if (!espConnected) {
                alert('Connect ESP first!');
                return;
            }
            
            if (sensorInterval) clearInterval(sensorInterval);
            
            sensorInterval = setInterval(() => {
                fetch(`http://${espIP}/sensors`)
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('ultrasonic').innerText = data.ultrasonic + ' cm';
                        document.getElementById('irSensor').innerText = data.ir ? '⚫ BLACK' : '⚪ WHITE';
                        
                        if (data.ultrasonic < 20) {
                            document.getElementById('obstacleWarning').innerText = '⚠️ OBSTACLE!';
                            if (isFollowing) stopFollow();
                        } else {
                            document.getElementById('obstacleWarning').innerText = '';
                        }
                        
                        if (data.ir) {
                            document.getElementById('goalWarning').innerText = '🎯 GOAL REACHED!';
                            if (isFollowing) stopFollow();
                        } else {
                            document.getElementById('goalWarning').innerText = '';
                        }
                    });
            }, 500);
        }
        
        // ========== FOLLOW MODE - RSSI BASED ==========
        function toggleFollow() {
            if (!espConnected) {
                alert('Connect ESP first!');
                return;
            }
            
            if (isFollowing) {
                stopFollow();
            } else {
                startFollow();
            }
        }
        
        function startFollow() {
            isFollowing = true;
            document.getElementById('followBtn').innerHTML = '⏸️ STOP FOLLOWING';
            document.getElementById('followBtn').style.background = '#f56565';
            document.getElementById('followStatus').innerHTML = '🔵 FOLLOW MODE: ACTIVE - Robot will follow your phone';
            
            // Clear any existing interval
            if (followInterval) clearInterval(followInterval);
            
            // Start following
            followInterval = setInterval(() => {
                fetch(`http://${espIP}/rssi`)
                    .then(r => r.text())
                    .then(rssi => {
                        const rssiVal = parseInt(rssi);
                        
                        // Update display
                        document.getElementById('rssiValue').innerText = rssiVal + ' dBm';
                        
                        // Update bar (RSSI range: -30 to -90)
                        let percent = 100 - ((rssiVal + 90) * 100 / 60);
                        if (percent < 0) percent = 0;
                        if (percent > 100) percent = 100;
                        document.getElementById('rssiFill').style.width = percent + '%';
                        
                        // FOLLOWING LOGIC:
                        // RSSI closer to 0 = stronger signal = phone is near
                        // RSSI more negative = weaker signal = phone is far
                        
                        if (rssiVal > -50) {
                            // Phone is very close - stop
                            sendCommand('stop');
                            document.getElementById('followStatus').innerHTML = '📱 PHONE NEAR - Stopped';
                        } 
                        else if (rssiVal > -65) {
                            // Phone is close - move slowly
                            sendCommand('forward');
                            document.getElementById('followStatus').innerHTML = '🚶 FOLLOWING - Moving slowly';
                        }
                        else if (rssiVal > -75) {
                            // Phone is medium distance - move normal
                            sendCommand('forward');
                            document.getElementById('followStatus').innerHTML = '🏃 FOLLOWING - Moving normal';
                        }
                        else {
                            // Phone is far - move fast
                            sendCommand('forward');
                            document.getElementById('followStatus').innerHTML = '⚡ FOLLOWING - Moving fast';
                        }
                    })
                    .catch(() => {
                        stopFollow();
                        alert('Lost connection to ESP!');
                    });
            }, 500);
        }
        
        function stopFollow() {
            isFollowing = false;
            if (followInterval) {
                clearInterval(followInterval);
                followInterval = null;
            }
            sendCommand('stop');
            
            document.getElementById('followBtn').innerHTML = '▶️ START FOLLOWING';
            document.getElementById('followBtn').style.background = '#9f7aea';
            document.getElementById('followStatus').innerHTML = '⏸️ Follow mode: OFF';
            document.getElementById('rssiFill').style.width = '0%';
            document.getElementById('rssiValue').innerText = '-- dBm';
        }
        
        // Start live on load
        window.onload = () => startLive();
    </script>
</body>
</html>
